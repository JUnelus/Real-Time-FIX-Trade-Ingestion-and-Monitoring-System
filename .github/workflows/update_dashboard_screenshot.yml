name: On-Demand Dashboard Screenshot Refresh

on:
  workflow_dispatch:

jobs:
  update-dashboard-screenshot:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: fixdb
          POSTGRES_USER: fixuser
          POSTGRES_PASSWORD: fixpass
        options: >-
          --health-cmd pg_isready -U fixuser -d fixdb
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: Generate FIX messages locally
        run: python producer/top_crypto_stocks_to_fix.py
        env:
          SKIP_KAFKA: 'true'

      - name: Create .env file
        run: |
          echo "POSTGRES_DB=fixdb" > .env
          echo "POSTGRES_USER=fixuser" >> .env
          echo "POSTGRES_PASSWORD=fixpass" >> .env
          echo "POSTGRES_HOST=localhost" >> .env

      - name: Initialize database
        run: python scripts/init_trades_db.py

      - name: Load generated FIX messages into Postgres
        run: python scripts/load_fix_messages_to_postgres.py daily_fix_messages.json --truncate

      - name: Start Streamlit and capture screenshot
        run: |
          # Start Streamlit in the background
          streamlit run dashboard/streamlit_app.py --logger.level=error &
          STREAMLIT_PID=$!
          
          # Wait for Streamlit to start
          sleep 8
          
          # Capture screenshot using playwright
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page(viewport={'width': 1280, 'height': 720})
              
              try:
                  page.goto('http://localhost:8501', wait_until='networkidle')
                  time.sleep(3)
                  
                  # Capture full page
                  page.screenshot(path='dashboard/img_updated.png', full_page=True)
                  print('Screenshot captured successfully')
              except Exception as e:
                  print(f'Screenshot error: {e}')
              finally:
                  browser.close()
          "
          
          # Kill Streamlit process
          kill $STREAMLIT_PID 2>/dev/null || true
        continue-on-error: true

      - name: Replace screenshot if successful
        run: |
          if [ -f "dashboard/img_updated.png" ]; then
            mv dashboard/img_updated.png dashboard/img.png
            echo "✅ Screenshot updated successfully"
          else
            echo "⚠️ Screenshot capture failed, keeping existing image"
          fi

      - name: Commit changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git add dashboard/img.png
          git diff --cached --quiet && echo "No screenshot changes to commit" && exit 0
          git commit -m "chore: update dashboard screenshot $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}

