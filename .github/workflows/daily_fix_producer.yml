name: Daily FIX Producer - Top 5 Crypto & Stocks

# Run daily at 9 AM UTC
on:
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-fix-messages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily FIX Producer
        run: |
          python producer/top_crypto_stocks_to_fix.py
        env:
          # Optional: Set Kafka servers if using external Kafka
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS || 'localhost:9092' }}

      - name: Upload FIX Messages
        uses: actions/upload-artifact@v3
        with:
          name: daily-fix-messages
          path: daily_fix_messages.json
          retention-days: 30

      - name: Generate Summary Report
        run: |
          echo "## Daily FIX Producer Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f daily_fix_messages.json ]; then
            echo "✅ FIX messages generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "**Message Count:** $(cat daily_fix_messages.json | grep -o '\"count\":' | wc -l)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No FIX messages file found" >> $GITHUB_STEP_SUMMARY
          fi

  # Optional: Push results back to repository
  commit-report:
    needs: generate-fix-messages
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: daily-fix-messages

      - name: Copy to docs
        run: |
          mkdir -p docs/daily_reports
          cp daily_fix_messages.json docs/daily_reports/fix_messages_$(date -u +%Y-%m-%d).json 2>/dev/null || true

      - name: Commit and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git add docs/daily_reports/ || true
          git commit -m "docs: update daily FIX messages report $(date -u +%Y-%m-%d)" || true
          git push || true

